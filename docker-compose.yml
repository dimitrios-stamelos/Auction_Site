version: "3.8"

services:
  db:
    image: postgres:15
    container_name: auction-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: auctiondb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: auction-adminer
    restart: always
    ports:
      - "8080:8080"

volumes:
  db_data:
